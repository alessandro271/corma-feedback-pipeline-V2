name: Weekly Feedback Digest

on:
  schedule:
    # Run every Friday at 9:00 AM Paris time (7:00 AM UTC summer / 8:00 AM UTC winter)
    - cron: "0 7 * * 5"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  run-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly digest
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_WEEKLY_PARENT_PAGE_ID: ${{ secrets.NOTION_WEEKLY_PARENT_PAGE_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEEKLY_WEBHOOK_URL: ${{ secrets.SLACK_WEEKLY_WEBHOOK_URL }}
        run: python main.py --weekly-digest --verbose
